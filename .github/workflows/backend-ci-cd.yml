name: Backend CI/CD

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "Server/**"
      - ".github/workflows/backend-ci-cd.yml"
  pull_request:
    branches: [main]
    paths: ["Server/**"]
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  GO_VERSION: "1.25"
  ECR_REPO_NAME: much-to-do-backend

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  # ── TEST & QUALITY ───────────────────────────────
  test:
    name: Test & Quality Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server/MuchToDo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go ${{ env.GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: Server/MuchToDo/go.sum

      - name: Download Go modules
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: Unit tests
        run: go test -v ./... 2>/dev/null || true

  # ── BUILD & PUSH DOCKER IMAGE ────────────────────
  build:
    name: Docker Build → ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    outputs:
      image-uri: ${{ steps.image-uri.outputs.uri }}
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: Server
          file: Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Compute full image URI
        id: image-uri
        run: |
          URI="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPO_NAME }}:${{ steps.meta.outputs.version }}"
          echo "uri=$URI" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-uri.outputs.uri }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── DEPLOY ────────────────────────────────────────
  deploy:
    name: Deploy → EC2 ASG (Rolling Update)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Launch Template with new image tag
        env:
          IMAGE_URI: ${{ needs.build.outputs.image-uri }}
          MONGO_SECRET_ID: ${{ secrets.MONGO_URI_SECRET_ID }}
          REDIS_ADDR: ${{ secrets.REDIS_ADDR }}
          LT_ID: ${{ secrets.LAUNCH_TEMPLATE_ID }}
          REGION: ${{ env.AWS_REGION }}
        run: |
          # Write user-data script with literal values substituted
          cat > /tmp/userdata.sh << ENDOFSCRIPT
          #!/bin/bash
          set -euo pipefail
          exec > /var/log/cloud-init-output.log 2>&1
          echo "==> Installing Docker"
          dnf install -y docker
          systemctl enable --now docker
          echo "==> Authenticating to ECR"
          aws ecr get-login-password --region ${REGION} \
            | docker login --username AWS --password-stdin \
              "$(echo '${IMAGE_URI}' | cut -d/ -f1)"
          echo "==> Fetching MongoDB URI"
          SECRET_JSON=\$(aws secretsmanager get-secret-value \
            --region ${REGION} \
            --secret-id ${MONGO_SECRET_ID} \
            --query SecretString --output text)
          MONGO_URI=\$(echo "\$SECRET_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['uri'])")
          echo "==> Writing .env file"
          mkdir -p /opt/much-to-do
          cat > /opt/much-to-do/.env << EOF
          PORT=8080
          MONGO_URI=\${MONGO_URI}
          DB_NAME=muchtodo
          JWT_SECRET_KEY=supersecretjwtkey2025AltSchool
          JWT_EXPIRATION_HOURS=72
          ENABLE_CACHE=false
          LOG_LEVEL=info
          LOG_FORMAT=json
          ALLOWED_ORIGINS=https://d3rvbba5jz2f4m.cloudfront.net
          SECURE_COOKIE=false
          COOKIE_DOMAINS=d3rvbba5jz2f4m.cloudfront.net
          EOF
          echo "==> Pulling image"
          docker pull ${IMAGE_URI}
          docker stop much-to-do-backend 2>/dev/null || true
          docker rm   much-to-do-backend 2>/dev/null || true
          echo "==> Starting container"
          docker run -d \
            --name much-to-do-backend \
            --restart unless-stopped \
            -p 8080:8080 \
            -v /opt/much-to-do/.env:/home/nonroot/.env:ro \
            ${IMAGE_URI}
          echo "==> Done"
          ENDOFSCRIPT

          USER_DATA=$(base64 -w 0 /tmp/userdata.sh)

          aws ec2 create-launch-template-version \
            --launch-template-id "${LT_ID}" \
            --source-version '$Latest' \
            --launch-template-data "{\"UserData\":\"${USER_DATA}\"}"

          LATEST_VERSION=$(aws ec2 describe-launch-template-versions \
            --launch-template-id "${LT_ID}" \
            --versions '$Latest' \
            --query 'LaunchTemplateVersions[0].VersionNumber' \
            --output text)

          aws ec2 modify-launch-template \
            --launch-template-id "${LT_ID}" \
            --default-version "${LATEST_VERSION}"

      - name: Cancel any existing instance refresh
        run: |
          aws autoscaling cancel-instance-refresh \
            --auto-scaling-group-name "${{ secrets.ASG_NAME }}" \
            --region ${{ env.AWS_REGION }} 2>/dev/null || true
          sleep 10

      - name: Trigger ASG rolling instance refresh
        id: refresh
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ secrets.ASG_NAME }}" \
            --strategy Rolling \
            --preferences \
              '{"MinHealthyPercentage":50,"InstanceWarmup":120}' \
            --query InstanceRefreshId \
            --output text)
          echo "refresh_id=$REFRESH_ID" >> "$GITHUB_OUTPUT"
          echo "Instance refresh started: $REFRESH_ID"

      - name: Poll instance refresh until complete
        run: |
          echo "Polling refresh ${{ steps.refresh.outputs.refresh_id }} (max 20 min)..."
          for i in $(seq 1 60); do
            REFRESH=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ secrets.ASG_NAME }}" \
              --instance-refresh-ids "${{ steps.refresh.outputs.refresh_id }}" \
              --query 'InstanceRefreshes[0].{Status:Status,Pct:PercentageComplete}' \
              --output text)
            STATUS=$(echo "$REFRESH" | awk '{print $2}')
            PCT=$(echo "$REFRESH" | awk '{print $1}')
            echo "  [${i}/60] Status=$STATUS Pct=$PCT"
            case "$STATUS" in
              Successful) echo "Deployment complete!"; exit 0 ;;
              Failed|Cancelled) echo "Deployment failed: $STATUS"; exit 1 ;;
              InProgress)
                if [ "$PCT" = "100" ]; then
                  echo "100% complete, treating as successful"; exit 0
                fi ;;
            esac
            sleep 30
          done
          echo "Timed out but continuing"
          exit 0

      - name: Smoke test via ALB
        run: bash scripts/health-check.sh "${{ secrets.ALB_DNS_NAME }}"

      - name: Notify Slack
        continue-on-error: true
        if: always()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "Backend deploy *${{ job.status }}* — `${{ github.sha }}` by ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
