version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: muchtodo-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: muchtodo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - muchtodo-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: muchtodo-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGO_URI: mongodb://admin:secret@mongodb:27017/muchtodo?authSource=admin
      MONGO_DB: muchtodo
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - muchtodo-net

volumes:
  mongo_data:
    driver: local

networks:
  muchtodo-net:
    driver: bridge
