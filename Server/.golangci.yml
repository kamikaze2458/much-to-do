run:
  timeout: 5m
  go: "1.22"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gocritic
    - revive
    - bodyclose
    - noctx
    - exhaustive

linters-settings:
  goimports:
    local-prefixes: github.com/Innocent9712/much-to-do

issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck, bodyclose]
